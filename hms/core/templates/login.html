{% extends 'base.html' %}

{% block content %}

<div class="grid" style="place-items:center; min-height: calc(100vh - 170px);">
    <div class="card" style="max-width: 460px; width: 100%;">
        <div class="page-title" style="text-align:center;">Welcome back</div>
        <p class="page-subtitle" style="text-align:center;">Login to manage appointments and calendar.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <label>Username</label>
                <input type="text" name="username" class="input" placeholder="Enter your username" required>
            </div>

            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password" class="input" placeholder="Enter your password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
            </div>
        </form>

        <div class="divider"></div>
        <p class="muted" style="text-align:center; margin:0;">
            Don’t have an account? <a href="/signup/" style="text-decoration: underline;">Create one</a>
        </p>
    </div>
</div>

{% endblock %}
