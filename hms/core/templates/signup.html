{% extends 'base.html' %}

{% block content %}

<div class="grid" style="place-items:center; min-height: calc(100vh - 170px);">
    <div class="card" style="max-width: 520px; width: 100%;">
        <div class="page-title" style="text-align:center;">Create your account</div>
        <p class="page-subtitle" style="text-align:center;">Choose your role and start booking.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <label>Username</label>
                <input type="text" name="username" class="input" placeholder="e.g. nikita" required>
            </div>

            <div class="form-row">
                <label>Email</label>
                <input type="email" name="email" class="input" placeholder="you@example.com" required>
            </div>

            <div class="form-row">
                <label>Password</label>
                <input type="password" name="password" class="input" placeholder="Create a strong password" required>
            </div>

            <div class="form-row">
                <label>Role</label>
                <select name="role" class="input" required>
                    <option value="doctor">Doctor</option>
                    <option value="patient">Patient</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width:100%;">Signup</button>
            </div>
        </form>

        <div class="divider"></div>
        <p class="muted" style="text-align:center; margin:0;">
            Already have an account? <a href="/login/" style="text-decoration: underline;">Login</a>
        </p>
    </div>
</div>

{% endblock %}
