<!DOCTYPE html>
<html>
<head>
    <title>HMS</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f6fa;
        }

        .navbar {
            background: #2f3640;
            color: white;
            padding: 15px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 8px 12px;
            background: #273c75;
            color: white;
            border: none;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn:hover {
            background: #192a56;
        }
        .input {
    width: 100%;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}
.input:focus {
    border-color: #273c75;
    outline: none;
}
    </style>
</head>
<body>

<div class="navbar">
    Hospital Management System
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
