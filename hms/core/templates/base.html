<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HMS</title>
    <style>
        :root{
            --bg: #0b1220;
            --surface: rgba(255,255,255,.06);
            --surface2: rgba(255,255,255,.09);
            --stroke: rgba(255,255,255,.12);
            --text: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.68);
            --brand: #6d5efc;
            --brand2: #3ad5ff;
            --danger: #ff4d6d;
            --success: #2dd4bf;
            --warn: #fbbf24;
            --shadow: 0 20px 60px rgba(0,0,0,.35);
            --radius: 16px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body{
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1000px 600px at 10% 10%, rgba(109, 94, 252, .30), transparent 60%),
                radial-gradient(900px 500px at 90% 15%, rgba(58, 213, 255, .18), transparent 55%),
                radial-gradient(900px 700px at 50% 95%, rgba(45, 212, 191, .10), transparent 50%),
                var(--bg);
        }

        a{ color: inherit; }
        .container{
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        .navbar{
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(12px);
            background: rgba(11,18,32,.55);
            border-bottom: 1px solid var(--stroke);
        }
        .nav-inner{
            max-width: 1100px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand{
            display:flex;
            align-items:center;
            gap: 10px;
            text-decoration:none;
            letter-spacing:.2px;
        }
        .brand-mark{
            width: 34px;
            height: 34px;
            border-radius: 11px;
            background: linear-gradient(135deg, var(--brand), var(--brand2));
            box-shadow: 0 10px 30px rgba(109,94,252,.28);
        }
        .brand-title{ font-weight: 700; }
        .brand-sub{ color: var(--muted); font-size: 12px; margin-top: 2px; }
        .nav-actions{ display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }

        .page-title{
            margin: 8px 0 2px;
            font-size: 28px;
            letter-spacing: -0.3px;
        }
        .page-subtitle{
            margin: 0 0 18px;
            color: var(--muted);
        }

        .card{
            background: linear-gradient(180deg, var(--surface2), var(--surface));
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
        }
        .card + .card{ margin-top: 14px; }

        .grid{
            display: grid;
            gap: 14px;
        }
        .grid-2{
            grid-template-columns: 1fr;
        }
        @media (min-width: 860px){
            .grid-2{ grid-template-columns: 1.2fr .8fr; }
        }

        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            text-decoration:none;
            cursor:pointer;
            transition: transform .06s ease, background .2s ease, border-color .2s ease, opacity .2s ease;
            font-weight: 600;
            user-select: none;
        }
        .btn:active{ transform: translateY(1px); }
        .btn-primary{
            background: linear-gradient(135deg, var(--brand), #5b9dff);
            border-color: rgba(255,255,255,.14);
        }
        .btn-primary:hover{ opacity: .95; }
        .btn-ghost{
            background: transparent;
            border-color: var(--stroke);
            color: var(--text);
        }
        .btn-ghost:hover{ background: rgba(255,255,255,.06); }
        .btn-danger{
            background: rgba(255,77,109,.14);
            border-color: rgba(255,77,109,.35);
            color: rgba(255,255,255,.92);
        }
        .btn-danger:hover{ background: rgba(255,77,109,.20); }

        .badge{
            display:inline-flex;
            align-items:center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            border: 1px solid var(--stroke);
            background: rgba(255,255,255,.05);
            color: var(--muted);
        }
        .badge-success{
            border-color: rgba(45,212,191,.35);
            background: rgba(45,212,191,.12);
            color: rgba(225,255,252,.92);
        }
        .badge-warn{
            border-color: rgba(251,191,36,.35);
            background: rgba(251,191,36,.12);
            color: rgba(255,248,226,.92);
        }

        .input, select.input{
            width:100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--stroke);
            background: rgba(255,255,255,.06);
            color: var(--text);
            outline: none;
        }
        .input::placeholder{ color: rgba(255,255,255,.45); }
        .input:focus{
            border-color: rgba(109,94,252,.55);
            box-shadow: 0 0 0 4px rgba(109,94,252,.16);
        }
        label{ color: var(--muted); font-size: 13px; }
        .form-row{ display:grid; gap: 8px; margin-bottom: 12px; }
        .form-actions{ margin-top: 14px; display:flex; gap: 10px; }

        .list{
            display:grid;
            gap: 12px;
        }
        .slot-meta{
            display:flex;
            flex-wrap: wrap;
            gap: 10px 12px;
            margin-top: 10px;
            color: var(--muted);
            font-size: 13px;
        }
        .slot-title{
            display:flex;
            align-items:flex-start;
            justify-content:space-between;
            gap: 12px;
        }
        .slot-title b{ font-size: 16px; }
        .muted{ color: var(--muted); }
        .divider{ height:1px; background: var(--stroke); margin: 16px 0; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-inner">
        <a class="brand" href="/">
            <div class="brand-mark"></div>
            <div>
                <div class="brand-title">Hospital Management System</div>
                <div class="brand-sub">Appointments • Calendar • Notifications</div>
            </div>
        </a>
        <div class="nav-actions">
            <a class="btn btn-ghost" href="/login/">Login</a>
            <a class="btn btn-primary" href="/signup/">Signup</a>
        </div>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
