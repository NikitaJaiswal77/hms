{% extends 'base.html' %}

{% block content %}

<div class="page-title">Add Slot</div>
<p class="page-subtitle">Create an availability window patients can book.</p>

<div class="card" style="max-width: 640px;">
    <form method="POST">
        {% csrf_token %}

        <div class="form-row">
            <label>Date</label>
            <input type="date" name="date" class="input" required>
        </div>

        <div class="grid" style="grid-template-columns: 1fr; gap: 12px;">
            <div class="form-row">
                <label>Start Time</label>
                <input type="time" name="start" class="input" required>
            </div>
            <div class="form-row">
                <label>End Time</label>
                <input type="time" name="end" class="input" required>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Slot</button>
            <a href="/doctor/" class="btn btn-ghost">Back</a>
        </div>
    </form>
</div>

{% endblock %}
